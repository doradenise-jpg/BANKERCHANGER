version: 2

updates:
  # Backend npm dependencies
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
    reviewers:
      - "doradenise-jpg"
    open-pull-requests-limit: 10
    groups:
      minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Frontend npm dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
    reviewers:
      - "doradenise-jpg"
    open-pull-requests-limit: 10
    groups:
      minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Indexer npm dependencies
  - package-ecosystem: "npm"
    directory: "/indexer"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
    reviewers:
      - "doradenise-jpg"
    open-pull-requests-limit: 5
    groups:
      minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Rust / Cargo dependencies (Soroban contracts)
  - package-ecosystem: "cargo"
    directory: "/contracts"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
    reviewers:
      - "doradenise-jpg"
    open-pull-requests-limit: 5

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci-cd"
    reviewers:
      - "doradenise-jpg"
